<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Online | SRC Sports Academy</title>

  <link rel="stylesheet" href="index.css">
  <script src="js/script.js" defer></script>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<header>
  <div class="navbar">
    <h2>SRC Sports</h2>

    <span class="menu-icon" onclick="toggleMenu()">☰</span>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="activities.html">Activities</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="event.html">Event</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="booking.html" class="active">Book</a></li>
    </ul>
  </div>
</header>

<!-- ================= HERO ================= -->
<section class="hero">
  <h1>Book a Training Session</h1>
  <p>Reserve your spot in the SRC Sports Academy</p>
</section>

<!-- ================= FORM ================= -->
<section class="container">

  <form class="booking-form" onsubmit="return validateForm()" aria-label="Booking Form">

    <h2>Booking Form</h2>

    <!-- NAME -->
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Enter your name" required>

    <!-- EMAIL -->
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="Enter your email" required>

    <!-- SPORT -->
    <label for="sport">Select Sport</label>
    <select id="sport" required>
      <option value="">-- Choose a sport --</option>
      <option>Football</option>
      <option>Basketball</option>
      <option>Taekwondo</option>
      <option>Golf</option>
      <option>Volleyball</option>
    </select>

    <!-- DATE -->
    <label for="date">Select Date</label>
    <input type="date" id="date" required>

    <!-- MESSAGE -->
    <label for="message">Additional Notes</label>
    <textarea id="message" rows="4" placeholder="Optional message"></textarea>

    <!-- CAPTCHA -->
    <label for="captcha">What is 5 + 3?</label>
    <input type="text" id="captcha" placeholder="Enter answer" required>

    <!-- BUTTON -->
    <button type="submit" class="btn">Book Now</button>

  </form>

</section>

<!-- ================= FOOTER ================= -->
<footer>
  <p>© 2026 SRC Sports Academy</p>
</footer>

</body>
</html>
